<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <header class="p-2">
        <div class="container-fulid">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <img src="./img/logo.png" alt="">
                </div>
                <div class="d-flex gap-4">
                    <a href="#" class="btn btn-outline-dark">Sign In</a>
                    <a href="#" class="btn btn-primary">Create an account</a>
                </div>
            </div>
        </div>
    </header>

    <section class="banner py-5">
        <div class="container">
            <div class="banner-wrapper text-center">
                <h1 class="mb-4">
                    <span class="d-md-block">File storage and sharing for</span>
                    <span class="d-md-block">remote teams that work</span>
                    <span class="d-md-block">together on Web3</span>    
                </h1>
                <p class="mb-4">
                    <span  class="d-md-block">Deupload is a online file manager on decentralized cloud storage and IPFS that</span>
                    <span  class="d-md-block">
                        allows you storage, share, collect files privately and team collaboration without</span> 
                    <span  class="d-md-block">subscription.</span>
                    </p>
                <div class="d-flex justify-content-center gap-4">
                    <a href="#" class="btn btn-primary">Get Started</a>
                    <a href="#" class="btn btn-outline-dark">Pricing</a>
                </div>    
            </div>
        </div>
    </section>

    <section class="main-img py-5">
        <div class="container">
            <div class="main-img-wrapper text-center">
                <img src="./img/main-img/hero.png" width="100%" alt="">
            </div>
        </div>
    </section>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
